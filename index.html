<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPC - Sistema de Compras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-section">
                <img src="https://i.postimg.cc/Wz5R0cdL/LOGONPC.png" alt="Logo NPC" class="logo-img" onerror="this.src='https://placehold.co/80x80?text=NPC'">
                <h1 class="brand-name">Controle de Compras</h1>
            </div>

            <nav class="menu">
                <a href="#" class="menu-item active" data-target="dashboard">
                    <i class="fa-solid fa-chart-pie"></i> Dashboard
                </a>
                <a href="#" class="menu-item" data-target="produtos">
                    <i class="fa-solid fa-box"></i> Produtos
                </a>
                <a href="#" class="menu-item" data-target="fornecedores">
                    <i class="fa-solid fa-truck"></i> Fornecedores
                </a>
                <a href="#" class="menu-item" data-target="ordens">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Ordens de Compra
                </a>
                <a href="#" class="menu-item active" data-target="Centro de estoque"
                    <i class="fa-solid fa-chart-pie"></i> Centro de Estoque
                <a/a>
            </a>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h2 id="page-title">Dashboard</h2>
                <div class="user-info">Setor de Compras | <span id="current-date"></span></div>
            </header>

            <section id="content-area">
                <div class="stats-grid">
                    <div class="card">
                        <h3>Pedidos Hoje</h3>
                        <p class="value">05</p>
                    </div>
                    <div class="card">
                        <h3>Itens em Falta</h3>
                        <p class="value warning">02</p>
                    </div>
                    <div class="card">
                        <h3>Orçamento Mensal</h3>
                        <p class="value info">R$ 15.400</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
